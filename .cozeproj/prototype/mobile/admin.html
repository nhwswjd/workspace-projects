  <script>
    $(function() {
      // Tab切换
      $('#tab-product').on('click', function() {
        $('#tab-product').removeClass('text-on-surface-variant').addClass('bg-primary text-on-primary');
        $('#tab-category').removeClass('bg-primary text-on-primary').addClass('text-on-surface-variant');
        $('#product-list').removeClass('hidden');
        $('#category-list').addClass('hidden');
      });

      $('#tab-category').on('click', function() {
        $('#tab-category').removeClass('text-on-surface-variant').addClass('bg-primary text-on-primary');
        $('#tab-product').removeClass('bg-primary text-on-primary').addClass('text-on-surface-variant');
        $('#category-list').removeClass('hidden');
        $('#product-list').addClass('hidden');
      });

      // 产品列表 - 编辑按钮 - 点击后应实现：
      // 1. 跳转到编辑页面，传递产品ID参数
      // 2. 编辑页面加载对应产品的数据进行编辑
      $('#product-list').on('click', '.btn-edit', function(e) {
        e.stopPropagation();
        var productId = $(this).closest('.product-card').data('id');
        console.log('编辑产品:', productId);
        window.location.href = 'product-detail.html?id=' + productId;
      });

      // 产品列表 - 删除按钮 - 点击后应实现：
      // 1. 显示确认删除模态框
      // 2. 用户确认后，调用后端API删除数据
      // 3. 删除成功后从列表中移除该项
      $('#product-list').on('click', '.btn-delete', function(e) {
        e.stopPropagation();
        var productCard = $(this).closest('.product-card');
        $('#delete-modal').removeClass('hidden');
        $('#btn-confirm-delete').data('target', productCard);
      });

      // 分类列表 - 编辑按钮 - 点击后应实现：
      // 1. 跳转到分类编辑页面，传递分类ID参数
      $('#category-list').on('click', '.btn-edit', function(e) {
        e.stopPropagation();
        var categoryId = $(this).closest('.category-card').data('id');
        console.log('编辑分类:', categoryId);
        alert('编辑分类功能: ' + categoryId);
      });

      // 分类列表 - 删除按钮
      $('#category-list').on('click', '.btn-delete', function(e) {
        e.stopPropagation();
        var categoryCard = $(this).closest('.category-card');
        $('#delete-modal').removeClass('hidden');
        $('#btn-confirm-delete').data('target', categoryCard);
      });

      // 取消删除
      $('#btn-cancel-delete').on('click', function() {
        $('#delete-modal').addClass('hidden');
        $('#btn-confirm-delete').removeData('target');
      });

      // 确认删除
      $('#btn-confirm-delete').on('click', function() {
        var target = $(this).data('target');
        if (target && target.length) {
          target.fadeOut(300, function() {
            $(this).remove();
          });
        }
        $('#delete-modal').addClass('hidden');
        $(this).removeData('target');
      });

      // 点击模态框背景关闭
      $('#delete-modal').on('click', function(e) {
        if (e.target === this) {
          $(this).addClass('hidden');
          $('#btn-confirm-delete').removeData('target');
        }
      });

      // 底部添加按钮 - 点击后应实现：
      // 1. 跳转到添加产品页面
      // 2. 或弹出添加产品表单
      $('#btn-add-product').on('click', function() {
        console.log('添加新产品');
        window.location.href = 'product-detail.html';
      });

      // 左侧菜单按钮
      $('#btn-menu').on('click', function() {
        console.log('打开侧边菜单');
        alert('侧边菜单功能（待实现）');
      });
    });

    // 初始化图标
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
