<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 - 清新蓝绿色 === */
      --color-primary:              #14b8a6;
      --color-primary-container:    #ccfbf1;
      --color-on-primary:          #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #fafafa;
      --color-surface-container-lowest:   #ffffff;
      --color-surface:                    #ffffff;
      --color-surface-container:          #f5f5f5;
      --color-surface-container-high:     #f0f0f0;
      --color-surface-container-highest:  #ebebeb;
      /* === 文字 === */
      --color-on-surface:           #1a1a1a;
      --color-on-surface-variant:   #666666;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #e0e0e0;
      --color-outline-variant:  #eeeeee;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.25rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 1px 3px rgba(0,0,0,0.04);
      --shadow-float:  0 4px 12px rgba(0,0,0,0.06);
      --shadow-dialog: 0 16px 32px rgba(0,0,0,0.08);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Inter", "Noto Sans SC", system-ui, sans-serif;
      background: #fafafa;
    }
    /* 隐藏滚动条但保持滚动功能 */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 瀑布流布局 */
    .waterfall-grid {
      column-count: 2;
      column-gap: 10px;
    }
    .waterfall-item {
      break-inside: avoid;
      margin-bottom: 10px;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#14b8a6',
            'primary-container': '#ccfbf1',
            'on-primary': '#ffffff',
            background: '#fafafa',
            surface: '#ffffff',
            'surface-container': '#f5f5f5',
            'on-surface': '#1a1a1a',
            'on-surface-variant': '#666666',
            outline: '#e0e0e0',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-background text-on-surface">

  <!-- 顶部 Header - 纯白背景 -->
  <header class="sticky top-0 z-40 bg-background">
    <div class="h-12 flex items-center justify-between px-4">
      <!-- 左侧菜单图标 -->
      <button id="btn-menu" class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors">
        <i data-lucide="menu-2" class="w-5 h-5 text-on-surface"></i>
      </button>
      <!-- 中间标题 -->
      <h1 class="text-base font-semibold text-on-surface tracking-tight">江南风景好</h1>
      <!-- 右侧占位 -->
      <div class="w-9"></div>
    </div>
  </header>

  <!-- @main-content:start -->
  <main class="overflow-y-auto pb-4">
    
    <!-- 搜索框区域 -->
    <div class="px-3 pt-2 pb-3">
      <div class="flex items-center gap-2">
        <!-- 搜索输入框 -->
        <div class="flex-1 relative">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant"></i>
          <input type="text" id="search-input" placeholder="搜索景点、摄影作品..." 
                 class="w-full bg-surface-container border-none rounded-full pl-10 pr-4 py-2.5 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"/>
        </div>
        <!-- 品牌色搜索按钮 -->
        <button id="btn-search" class="bg-primary text-on-primary rounded-full px-4 py-2.5 text-sm font-medium hover:bg-primary/90 active:scale-[0.98] transition-all">
          搜索
        </button>
      </div>
    </div>

    <!-- 分类标签 - 横向滚动胶囊 -->
    <div class="px-3 pb-3">
      <div class="flex items-center gap-2 overflow-x-auto hide-scrollbar pb-1">
        <!-- 列表-全部标签 -->
        <button class="category-tag flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium bg-primary text-on-primary transition-all" data-category="all">
          全部
        </button>
        <!-- 列表-山水标签 -->
        <button class="category-tag flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium bg-surface text-on-surface-variant shadow-card transition-all hover:bg-surface-container" data-category="landscape">
          山水
        </button>
        <!-- 列表-古镇标签 -->
        <button class="category-tag flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium bg-surface text-on-surface-variant shadow-card transition-all hover:bg-surface-container" data-category="ancient">
          古镇
        </button>
        <!-- 列表-园林标签 -->
        <button class="category-tag flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium bg-surface text-on-surface-variant shadow-card transition-all hover:bg-surface-container" data-category="garden">
          园林
        </button>
        <!-- 列表-日出日落标签 -->
        <button class="category-tag flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium bg-surface text-on-surface-variant shadow-card transition-all hover:bg-surface-container" data-category="sunrise">
          日出日落
        </button>
        <!-- 列表-荷花标签 -->
        <button class="category-tag flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium bg-surface text-on-surface-variant shadow-card transition-all hover:bg-surface-container" data-category="lotus">
          荷花
        </button>
        <!-- 列表-烟雨标签 -->
        <button class="category-tag flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-medium bg-surface text-on-surface-variant shadow-card transition-all hover:bg-surface-container" data-category="rain">
          烟雨
        </button>
      </div>
    </div>

    <!-- 瀑布流网格 - 两列布局 -->
    <div class="px-3">
      <div class="waterfall-grid">
        
        <!-- 列表-瀑布流卡片1：西湖残雪 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=1" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">

                   alt="西湖残雪" 
                   data-category="自然风景"
                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">西湖残雪</p>
            </div>
          </a>
        </div>

        <!-- 列表-瀑布流卡片2：乌镇夜色 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=2" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">
              <img src="https://images.unsplash.com/photo-1537531383496-f4749b85ceb3?w=400&h=350&fit=crop" 
                   alt="乌镇夜色"

              <img src="https://images.unsplash.com/photo-1599693988357-d2e8c17a5a25?w=400&h=450&fit=crop" 
                   alt="拙政园亭台" 
                   data-category="建筑城市"
                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">拙政园</p>
            </div>
          </a>
        </div>

        <!-- 列表-瀑布流卡片4：漓江竹筏 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=4" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">

        <!-- 列表-瀑布流卡片5：宏村晨雾 -->

              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">宏村晨雾</p>

        </div>

        <!-- 列表-瀑布流卡片6：西湖荷花 -->
        <div class="waterfall-item">

                   data-category="自然风景"
                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">西湖荷花</p>
            </div>
          </a>
        </div>

        <!-- 列表-瀑布流卡片7：周庄烟雨 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=7" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">
              <img src="https://images.unsplash.com/photo-1545893835-abaa50cbe628?w=400&h=420&fit=crop"

        <!-- 列表-瀑布流卡片8：黄山云海 -->

                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">黄山云海</p>
            </div>

        </div>

        <!-- 列表-瀑布流卡片9：南浔古镇 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=9" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">
              <img src="https://images.unsplash.com/photo-1537531383496-f4749b85ceb3?w=400&h=360&fit=crop" 
                   alt="南浔古镇" 
                   data-category="建筑城市"
                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">南浔古镇</p>
            </div>
          </a>
        </div>

        <!-- 列表-瀑布流卡片10：钱塘日落 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=10" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">
              <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=440&fit=crop" 
                   alt="钱塘日落" 
                   data-category="自然风景"
                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">钱塘日落</p>
            </div>
          </a>
        </div>

        <!-- 列表-瀑布流卡片11：苏州河畔 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=11" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">
              <img src="https://images.unsplash.com/photo-1599571234909-29ed5d1321d6?w=400&h=400&fit=crop" 
                   alt="苏州河畔" 
                   data-category="建筑城市"
                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">苏州河畔</p>
            </div>
          </a>
        </div>

        <!-- 列表-瀑布流卡片12：千岛晨曦 -->
        <div class="waterfall-item">
          <a href="product-detail.html?id=12" class="block">
            <div class="bg-surface rounded-xl shadow-card overflow-hidden">
              <img src="https://images.unsplash.com/photo-1562016600-ece13e8ba570?w=400&h=460&fit=crop" 
                   alt="千岛晨曦" 
                   data-category="自然风景"
                   class="w-full object-cover"/>
              <p class="text-[10px] text-on-surface-variant px-1 py-0.5 truncate">千岛晨曦</p>
            </div>

        </div>

      </div>
    </div>

  </main>
  <!-- @main-content:end -->

  <script>
    // 导航函数
    function navPush(route) {
      console.log('[原型演示] PUSH 到: ' + route);
      window.location.href = route;
    }

    function navReplace(route) {
      console.log('[原型演示] REPLACE 为: ' + route);
      window.location.replace(route);
    }

    function navReset(route) {
      console.log('[原型演示] RESET 到: ' + route);
      window.location.href = route;
    }

    function navBack() {
      console.log('[原型演示] BACK 返回上一页');
      if (window.history.length > 1) window.history.back();
    }

    $(function() {
      // 菜单按钮点击
      $('#btn-menu').on('click', function() {
        console.log('打开侧边菜单');
      });

      // 搜索按钮点击
      $('#btn-search').on('click', function() {
        var keyword = $('#search-input').val();
        console.log('搜索关键词:', keyword);
        // TODO: 实现搜索功能 - 根据关键词筛选瀑布流卡片
      });

      // 分类标签切换
      $('.category-tag').on('click', function() {
        var $this = $(this);
        var category = $this.data('category');
        
        // 切换激活状态
        $('.category-tag').each(function() {
          var $tag = $(this);
          if ($tag.data('category') === category) {
            $tag.removeClass('bg-surface text-on-surface-variant shadow-card hover:bg-surface-container');
            $tag.addClass('bg-primary text-on-primary');
          } else {
            $tag.removeClass('bg-primary text-on-primary');
            $tag.addClass('bg-surface text-on-surface-variant shadow-card hover:bg-surface-container');
          }
        });
        
        console.log('切换分类:', category);
        // TODO: 实现分类筛选 - 根据分类过滤瀑布流卡片显示
      });

      // 瀑布流卡片点击
      $('.waterfall-item a').on('click', function(e) {
        e.preventDefault();
        var href = $(this).attr('href');
        navPush(href);
      });
    });

    // 初始化图标
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>

</html>
